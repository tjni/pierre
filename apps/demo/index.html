<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>PierreJS R&amp;D</title>
  </head>
  <body>
    <div id="root">
      <div class="tools-container">
        <div class="tools">
          <button id="render-file">Render File</button>
          <button id="render-conflict">Render Conflict</button>
          <button id="stream-code">Stream Code</button>
          <button id="diff-files">Diff Two Files</button>
          <button id="load-diff">Old Virtualizer</button>
          <button id="render-code-view">Render CodeView</button>
          <!-- <button id="worker-load-diff">Worker Render Diff</button> -->
          <button id="clean">Clean</button>
          <button id="toggle-theme">Toggle Theme</button>
          <label>
            <input id="unified" type="checkbox" />
            Unified
          </label>
          <label>
            <input id="wrap-lines" type="checkbox" />
            Wrap
          </label>
          <label>
            <input id="lag-radar" type="checkbox" />
            Lag Radar
          </label>
        </div>
      </div>
      <div id="wrapper" class="wrapper"></div>
    </div>
    <!-- lag radar -->
    <div
      id="radar"
      style="
        display: none;
        position: fixed;
        bottom: 4px;
        right: 4px;
        width: 100px;
        height: 100px;
        z-index: 100;
        pointer-events: none;
      "
    ></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
