$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

workspace:
  inheritedTasks:
    # No test suite in this app.
    exclude: ['test']

tasks:
  build:
    command: 'vite build'
    deps:
      - '^:build'
    outputs:
      - 'dist'

  # Build deps run to completion first, then dependency watchers (`^:dev`)
  # run alongside the vite server.
  dev:
    command: 'vite --host --clearScreen=false'
    preset: 'server'
    deps:
      - '^:build'
      - '^:dev'

  start:
    command: 'vite preview'
    preset: 'server'

  prod:
    command: 'vite preview'
    preset: 'server'
    deps:
      - 'build'
