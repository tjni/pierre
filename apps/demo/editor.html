<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/editor/icon.svg" />
    <link rel="apple-touch-icon" href="/editor/touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="diffs" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0a0a0a"
    />
    <title>PierreJS R&amp;D</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: light-dark(#ffffff, #0a0a0a);
        transition: opacity 0.2s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash img {
        animation: splash-pulse 1.2s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/editor/icon.svg" width="64" height="64" alt="" />
    </div>
    <div id="editor">
      <div id="file-tree-container"></div>
      <div id="editor-container"></div>
      <!-- <div id="sidebar"></div> -->
    </div>
    <script type="module" src="/src/editor.ts"></script>

    <!-- lag radar -->
    <div
      id="radar"
      style="
        position: fixed;
        bottom: 4px;
        right: 4px;
        width: 100px;
        height: 100px;
        z-index: 100;
      "
    ></div>
    <script type="module">
      import lagRadar from 'https://mobz.github.io/lag-radar/lag-radar.js';
      const dispose = lagRadar({
        parent: document.querySelector('#radar'),
        size: 100,
        frames: 60,
      });
    </script>
  </body>
</html>
