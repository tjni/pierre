<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>PierreJS R&amp;D</title>
  </head>
  <body>
    <div id="editor">
      <div id="file-tree-container">
        <header slot="header" id="file-tree-header">
          <h1>
            <svg
              fill="none"
              height="32"
              viewBox="0 0 32 32"
              width="32"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="m16 0c-13.176 0-16 2.824-16 16s2.824 16 16 16 16-2.824 16-16-2.824-16-16-16z"
                fill="#000"
              />
              <g fill="#fff">
                <path
                  d="m17.5001 8.59222c0-.82842-.6716-1.5-1.5-1.5-.8285 0-1.5.67158-1.5 1.5v3.90778h-4.0001c-.82843 0-1.5.6716-1.5 1.5s.67157 1.5 1.5 1.5h4.0001v3h3v-3h3.9999c.8284 0 1.5-.6716 1.5-1.5s-.6716-1.5-1.5-1.5h-3.9999z"
                />
                <path
                  d="m10.5 20c-.82843 0-1.5.6716-1.5 1.5s.67157 1.5 1.5 1.5h11c.8284 0 1.5-.6716 1.5-1.5s-.6716-1.5-1.5-1.5z"
                />
              </g>
            </svg>
            @pierre/diffs
          </h1>
        </header>
      </div>
      <div id="editor-container"></div>
      <!-- <div id="sidebar"></div> -->
    </div>
    <script type="module" src="/src/editor.ts"></script>

    <!-- lag radar -->
    <div
      id="radar"
      style="
        position: fixed;
        bottom: 0;
        right: 0;
        width: 100px;
        height: 100px;
        z-index: 1000;
      "
    ></div>
    <script type="module">
      import lagRadar from 'https://mobz.github.io/lag-radar/lag-radar.js';
      const dispose = lagRadar({
        parent: document.querySelector('#radar'),
        size: 100,
        frames: 60,
      });
    </script>
  </body>
</html>
