name: Set up moon and caches
description: >-
  Install the proto-pinned toolchain (.prototools is the single source of truth
  for bun, node, and moon versions) and mount Blacksmith sticky disks for
  everything cacheable: the proto toolchain, bun's download cache, and moon's
  workspace cache. moon installs workspace dependencies itself with a frozen
  lockfile when a task requires them, so there is no explicit `bun install`
  step.

runs:
  using: composite
  steps:
    # Sticky disks restore in seconds and persist per-key across runs, which
    # is what makes moon's local cache behave like a warm remote cache in CI.
    - name: Mount proto toolchain cache
      uses: useblacksmith/stickydisk@2b7a836cbb2b48f4780ae76a7b6fd79d545fb54a # v1.3.0
      with:
        key: ${{ github.repository }}-proto-${{ runner.os }}
        path: ~/.proto

    - name: Mount bun download cache
      uses: useblacksmith/stickydisk@2b7a836cbb2b48f4780ae76a7b6fd79d545fb54a # v1.3.0
      with:
        key: ${{ github.repository }}-bun-install-${{ runner.os }}
        path: ~/.bun/install/cache

    # Persist only the portable parts of moon's cache: moon documents
    # `hashes` and `outputs` as safe to share between environments, while
    # `states` holds machine-specific run state that must be rebuilt per run.
    - name: Mount moon hash cache
      uses: useblacksmith/stickydisk@2b7a836cbb2b48f4780ae76a7b6fd79d545fb54a # v1.3.0
      with:
        key: ${{ github.repository }}-moon-hashes-${{ runner.os }}
        path: ${{ github.workspace }}/.moon/cache/hashes

    - name: Mount moon output cache
      uses: useblacksmith/stickydisk@2b7a836cbb2b48f4780ae76a7b6fd79d545fb54a # v1.3.0
      with:
        key: ${{ github.repository }}-moon-outputs-${{ runner.os }}
        path: ${{ github.workspace }}/.moon/cache/outputs

    # Installs proto, then `proto install` provisions every tool pinned in
    # .prototools (bun, node, moon, gh). The action's own actions/cache layer
    # is disabled because the sticky disk above already owns ~/.proto.
    - name: Install proto and moon
      uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
      with:
        auto-install: true
        cache: false
