name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Dependencies
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        run: bun ws "packages/*" build

      - name: Build docs (generates .source)
        run: bun ws docs build

      - name: Build docs (diffshub)
        run: NEXT_PUBLIC_SITE=diffshub bun ws docs build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/diffs/dist/
            packages/trees/dist/
            packages/storage-elements/dist/
            packages/storage-elements-next/dist/
            apps/docs/.source/
            apps/docs/.next/
          retention-days: 1

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run Lint
        run: bun run lint

  stylelint:
    name: Stylelint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Stylelint
        run: bun run lint:css

  format:
    name: Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Format check
        run: bun run format:check

  test:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run tests - precision-diffs
        run: bun ws diffs test

      - name: Run tests - trees
        run: bun ws trees test

      - name: Run tests - path-store
        run: bun ws path-store test

      - name: Mount Playwright browsers
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-playwright-browsers-${{ runner.os }}
          path: ~/.cache/ms-playwright
      - name: Install Playwright browser - trees
        run: bunx playwright@1.51.1 install --with-deps chromium

      - name: Run tests - trees e2e
        run: bun ws trees test:e2e

  typecheck:
    name: TypeScript
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Type check all workspaces
        run: bun run ws "*" tsc
