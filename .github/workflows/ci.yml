name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Everything except browser e2e: moon computes the affected projects from
  # the VCS diff (PR base, or the push range on main) and runs only their
  # tasks, in graph order, restoring unchanged build outputs from the moon
  # cache on the sticky disk. The target list below is every CI-relevant
  # task except trees:test-e2e, which runs in its own lane so the slowest
  # suite never serializes behind builds (moon ci has no exclude flag, so
  # the list is explicit — add new CI tasks here).
  ci:
    name: Build, test, lint
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # moon diffs against the merge base to compute affected projects.
          fetch-depth: 0

      - name: Set up moon and caches
        uses: ./.github/actions/setup

      - name: Run affected tasks
        run: >-
          moon ci --include-relations :build docs:build-trees-site
          path-store:build-demo :test :typecheck root:lint root:lint-css
          root:format-check

  e2e:
    name: E2E (trees)
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up moon and caches
        uses: ./.github/actions/setup

      - name: Mount Playwright browsers
        uses: useblacksmith/stickydisk@2b7a836cbb2b48f4780ae76a7b6fd79d545fb54a # v1.3.0
        with:
          key: ${{ github.repository }}-playwright-browsers-${{ runner.os }}
          path: ~/.cache/ms-playwright

      # System libraries are per-runner and not covered by the browser cache.
      - name: Install Playwright browser
        run: bunx playwright@1.51.1 install --with-deps chromium

      # Affected-aware: skips itself (and the build chain it depends on)
      # when trees is untouched.
      - name: Run trees e2e
        run: moon ci --include-relations trees:test-e2e

  actions-pinned:
    name: Actions pinned to SHA
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify external actions are pinned to a full commit SHA
        run: |
          # Supply-chain guard: every external action must be pinned to a
          # 40-character commit SHA, never a movable tag/branch. Local actions
          # (uses: ./...) ship with the repo and are exempt. Scans the workflows
          # and the shared composite action manifest alike.
          set -euo pipefail
          unpinned=$(
            grep -rEn '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*[^.[:space:]]' .github \
              | grep -vE 'uses:[[:space:]]*[^[:space:]]+@[0-9a-fA-F]{40}([[:space:]]|#|"|'"'"'|$)' \
              || true
          )
          if [ -n "$unpinned" ]; then
            echo "::error::These actions are not pinned to a full commit SHA:"
            echo "$unpinned"
            echo "Pin each to a 40-character commit SHA, e.g. owner/repo@<sha> # vX.Y.Z"
            exit 1
          fi
          echo "All external actions are pinned to a full commit SHA."
