name: Publish Theme

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  extensions:
    name: Publish VS Code and Open VSX extensions
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up moon and caches
        uses: ./.github/actions/setup

      - name: Publish extensions
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: moonx theme:publish-extensions --ignore-ci-checks

  npm:
    name: Publish @pierre/theme to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up moon and caches
        uses: ./.github/actions/setup

      - name: Configure npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run:
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" >
          ~/.npmrc

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/theme
        run: CI= bun publish --access public --provenance
