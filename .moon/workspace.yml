$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Fail fast when a developer's proto-installed moon drifts from the repo pin
# in .prototools; both must move together.
versionConstraint: '2.3.3'

projects:
  globs:
    - 'packages/*'
    - 'apps/*'
  sources:
    # Repo-wide tooling (lint, format, icons, clean) lives on the root project.
    root: '.'

vcs:
  client: 'git'
  defaultBranch: 'main'
