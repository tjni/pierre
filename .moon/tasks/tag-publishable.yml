$schema: 'https://moonrepo.dev/schemas/tasks.json'

# Guard chain for packages published to npm. Each published package keeps a
# single npm lifecycle script, `"prepublishOnly": "moon run <name>:prepublish"`,
# which `bun publish` fires automatically; everything it runs is defined here.
inheritedBy:
  tags: ['publishable']

tasks:
  # Publishes must use the bun version pinned in .prototools so lockfile and
  # bundling behavior match CI. The script reads the pin itself.
  assert-bun-version:
    command: 'bun $workspaceRoot/scripts/assert-bun-version.ts'
    preset: 'utility'
    options:
      internal: true

  # Aggregator the prepublishOnly lifecycle hook points at. Projects append
  # extra guards via dep merge (e.g. trees adds assert-safe-publish).
  prepublish:
    command: 'noop'
    preset: 'utility'
    deps:
      - 'assert-bun-version'
      - 'build'
